version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: ticketbot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketbot}
      POSTGRES_USER: ${POSTGRES_USER:-ticketbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketbot} -d ${POSTGRES_DB:-ticketbot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - botnet

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketbot_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./logs:/app/logs
    networks:
      - botnet
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  botnet:
    driver: bridge
